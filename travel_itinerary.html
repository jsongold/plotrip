<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Travel Itinerary</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif; }
  body { display: flex; flex-direction: column; height: 100vh; background: #f5f5f5; }
  #map { flex: 1 1 65%; min-height: 300px; }
  #panel {
    flex: 0 0 auto;
    max-height: 45vh;
    overflow-y: auto;
    background: #fff;
    border-top: 1px solid #ddd;
    padding: 12px 16px;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
  }
  .toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
  .toolbar input[type="text"] {
    flex: 1;
    min-width: 160px;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
  }
  button {
    padding: 7px 12px;
    border: 1px solid #ccc;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { background: #f0f0f0; }
  button.primary { background: #2563eb; color: white; border-color: #2563eb; }
  button.primary:hover { background: #1d4ed8; }
  button.danger { color: #dc2626; }
  ul#cities { list-style: none; padding: 0; margin: 0; }
  ul#cities li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px;
    border: 1px solid #eee;
    border-radius: 6px;
    margin-bottom: 6px;
    background: #fafafa;
  }
  .idx { font-weight: bold; color: #2563eb; min-width: 24px; text-align: center; }
  .name { flex: 1; font-size: 14px; }
  .coord { font-size: 11px; color: #888; }
  .row-btns { display: flex; gap: 4px; }
  .row-btns button { padding: 4px 8px; font-size: 12px; }
  #status { font-size: 12px; color: #666; margin-left: 8px; }
  .share-row { display: flex; gap: 8px; margin-top: 8px; }
  .share-row input { flex: 1; padding: 6px; font-size: 12px; border: 1px solid #ddd; border-radius: 4px; background: #f9f9f9; }
</style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <div class="toolbar">
    <input type="text" id="cityInput" placeholder="都市名を入力 (例: Tokyo, Paris, New York)" />
    <button class="primary" id="addBtn">追加</button>
    <button id="toggleCatalogBtn">世界都市を表示</button>
    <button id="shareBtn">共有URL生成</button>
    <button class="danger" id="clearBtn">全クリア</button>
    <span id="status"></span>
  </div>
  <div class="share-row" id="shareRow" style="display:none;">
    <input type="text" id="shareUrl" readonly />
    <button id="copyBtn">コピー</button>
  </div>
  <ul id="cities"></ul>
</div>

// ---- Map init ----
map = L.map('map').setView([20, 0], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 19
}).addTo(map);
markerLayer = L.layerGroup().addTo(map);
lineLayer = L.layerGroup().addTo(map);
catalogLayer = L.layerGroup();

function renderCatalog() {
  catalogLayer.clearLayers();
  CATALOG.forEach(([name, lat, lng]) => {
    const dot = L.circleMarker([lat, lng], {
      radius: 5,
      color: '#555',
      weight: 1,
      fillColor: '#bbb',
      fillOpacity: 0.85,
      interactive: true,
      bubblingMouseEvents: false
    });
    dot.bindTooltip(name, { direction: 'top' });
    dot.on('click', (e) => {
      L.DomEvent.stopPropagation(e);
      console.log('[catalog click]', name, lat, lng);
      if (cities.some(c => c.name === name && Math.abs(c.lat - lat) < 0.01)) {
        document.getElementById('status').textContent = `${name} は既に追加済み`;
        setTimeout(() => document.getElementById('status').textContent = '', 2000);
        return;
      }
      cities.push({ name, lat, lng });
      render();
    });
    dot.addTo(catalogLayer);
  });
}
renderCatalog();

// ---- URL load ----
function loadFromUrl() {
  const params = new URLSearchParams(location.search);
  const d = params.get('d');
  if (!d) return;
  try {
    const json = decodeURIComponent(escape(atob(d)));
    const arr = JSON.parse(json);
    if (Array.isArray(arr)) cities = arr;
  } catch (e) {
    console.warn('URL decode failed', e);
  }
}

// ---- Render ----
function render() {
  // List
  const ul = document.getElementById('cities');
  ul.innerHTML = '';
  cities.forEach((c, i) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <span class="idx">${i + 1}</span>
      <span class="name">${escapeHtml(c.name)} <span class="coord">(${c.lat.toFixed(3)}, ${c.lng.toFixed(3)})</span></span>
      <span class="row-btns">
        <button data-act="up" data-i="${i}" ${i === 0 ? 'disabled' : ''}>↑</button>
        <button data-act="down" data-i="${i}" ${i === cities.length - 1 ? 'disabled' : ''}>↓</button>
        <button data-act="del" data-i="${i}" class="danger">削除</button>
      </span>
    `;
    ul.appendChild(li);
  });

  // Map
  markerLayer.clearLayers();
  lineLayer.clearLayers();

  cities.forEach((c, i) => {
    const marker = L.marker([c.lat, c.lng])
      .bindTooltip(`${i + 1}. ${c.name}`, { permanent: true, direction: 'top', offset: [-15, -10] });
    marker.addTo(markerLayer);
  });

  if (cities.length >= 2) {
    const latlngs = cities.map(c => [c.lat, c.lng]);
    const poly = L.polyline(latlngs, { color: '#2563eb', weight: 3, opacity: 0.8 }).addTo(lineLayer);
    L.polylineDecorator(poly, {
      patterns: [{
        offset: '5%',
        repeat: '15%',
        symbol: L.Symbol.arrowHead({
          pixelSize: 12,
          polygon: false,
          pathOptions: { stroke: true, color: '#2563eb', weight: 2 }
        })
      }]
    }).addTo(lineLayer);
  }

  // Fit bounds
  if (cities.length > 0) {
    const bounds = L.latLngBounds(cities.map(c => [c.lat, c.lng]));
    if (cities.length === 1) map.setView([cities[0].lat, cities[0].lng], 5);
    else map.fitBounds(bounds, { padding: [40, 40] });
  }

  // Keep catalog dots on top so they remain clickable
  if (catalogVisible) {
    catalogLayer.eachLayer(l => l.bringToFront && l.bringToFront());
  }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

// ---- Geocoding (Nominatim) ----
async function geocode(name) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(name)}`;
  const res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  if (!res.ok) throw new Error('Geocode failed');
  const data = await res.json();
  if (!data.length) throw new Error('Not found');
  return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), display: data[0].display_name };
}

// ---- Events ----
document.getElementById('addBtn').addEventListener('click', addCity);
document.getElementById('cityInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCity();
});

async function addCity() {
  const input = document.getElementById('cityInput');
  const status = document.getElementById('status');
  const name = input.value.trim();
  if (!name) return;
  status.textContent = '検索中...';
  try {
    const r = await geocode(name);
    cities.push({ name: name, lat: r.lat, lng: r.lng });
    input.value = '';
    status.textContent = '';
    render();
  } catch (e) {
    status.textContent = '見つかりませんでした';
  }
}

document.getElementById('cities').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const i = parseInt(btn.dataset.i, 10);
  const act = btn.dataset.act;
  if (act === 'del') cities.splice(i, 1);
  else if (act === 'up' && i > 0) [cities[i-1], cities[i]] = [cities[i], cities[i-1]];
  else if (act === 'down' && i < cities.length - 1) [cities[i+1], cities[i]] = [cities[i], cities[i+1]];
  render();
});

document.getElementById('toggleCatalogBtn').addEventListener('click', () => {
  catalogVisible = !catalogVisible;
  const btn = document.getElementById('toggleCatalogBtn');
  if (catalogVisible) {
    catalogLayer.addTo(map);
    btn.textContent = '世界都市を隠す';
  } else {
    map.removeLayer(catalogLayer);
    btn.textContent = '世界都市を表示';
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (cities.length === 0) return;
  if (confirm('全て削除しますか?')) {
    cities = [];
    render();
  }
});

document.getElementById('shareBtn').addEventListener('click', () => {
  if (cities.length === 0) {
    alert('都市を追加してください');
    return;
  }
  const json = JSON.stringify(cities);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  const url = `${location.origin}${location.pathname}?d=${b64}`;
  const row = document.getElementById('shareRow');
  const inp = document.getElementById('shareUrl');
  inp.value = url;
  row.style.display = 'flex';
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const inp = document.getElementById('shareUrl');
  inp.select();
  navigator.clipboard.writeText(inp.value).then(() => {
    document.getElementById('status').textContent = 'コピーしました';
    setTimeout(() => document.getElementById('status').textContent = '', 2000);
  });
});

// ---- Init ----
loadFromUrl();
render();
</script>

</body>
</html>
